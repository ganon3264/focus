{% from "macros.html" import icon_expand, icon_plus %} {% from "modal_shell.html" import modal_shell %} {% call
modal_shell('modal-edit-message', 'Edit Message', max_width='800px',
content_style='display:flex;flex-direction:column;max-height:90vh;', z_index='100') %}
<div class="flex-1 overflow-y-auto flex flex-col gap-4 pr-2 scroll-fade min-h-0">
  <input type="hidden" id="edit-msg-id" />
  <input type="hidden" id="edit-msg-chat-id" />

  <div id="edit-msg-blocks" class="flex flex-col gap-3"></div>
</div>

<div style="flex-shrink:0;border-top:1px solid var(--border);padding-top:0.75rem;margin-top:0.5rem">
  <div class="flex justify-between items-center mb-1">
    <label class="text-sm font-bold text-muted">Attachments</label>
    <button
      class="btn btn-secondary btn-sm"
      onclick="document.getElementById('edit-msg-attach-input').click()"
    >
      {{ icon_plus(14) }} Add Media
    </button>
    <input
      type="file"
      id="edit-msg-attach-input"
      class="hidden"
      multiple
      accept="image/*,audio/*"
      onchange="uploadMessageAttachment(this)"
    />
  </div>
  <div
    id="edit-msg-attachments"
    class="flex gap-2 flex-wrap empty:hidden p-2 rounded"
    style="background: var(--surface-2); border: 1px solid var(--border); min-height: 2.5rem"
  ></div>
</div>
<div class="flex gap-2 mt-4 pt-4">
  <button class="btn btn-primary" style="width: 100px" onclick="saveMessageEdit()">Save</button>
  <button
    class="btn btn-secondary"
    style="width: 100px"
    type="button"
    onclick="closeModal('modal-edit-message')"
  >
    Cancel
  </button>
</div>
{% endcall %}
<template id="edit-msg-expand-btn">
  <button type="button" class="expand-btn" aria-label="Expand text area" data-action="actionOpenTextExpander">
    {{ icon_expand(18) }}
  </button>
</template>
