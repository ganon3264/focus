{% from "macros.html" import icon_plus %} {% from "modal_shell.html" import modal_shell %} {% call
modal_shell('modal-edit-message', 'Edit Message', max_width='800px',
content_style='display:flex;flex-direction:column;max-height:85vh;', z_index='100') %}
<div
  style="
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    padding-right: 0.5rem;
  "
>
  <input type="hidden" id="edit-msg-id" />
  <input type="hidden" id="edit-msg-chat-id" />

  <div id="edit-msg-blocks" style="display:flex;flex-direction:column;gap:0.75rem"></div>
</div>

<div style="flex-shrink:0">
  <div class="flex justify-between items-center mb-1">
    <label class="text-sm font-bold text-muted">Attachments</label>
    <button
      class="btn btn-secondary btn-sm"
      onclick="document.getElementById('edit-msg-attach-input').click()"
    >
      {{ icon_plus(14) }} Add Media
    </button>
    <input
      type="file"
      id="edit-msg-attach-input"
      class="hidden"
      multiple
      accept="image/*,audio/*"
      onchange="uploadMessageAttachment(this)"
    />
  </div>
  <div
    id="edit-msg-attachments"
    class="flex gap-2 flex-wrap empty:hidden p-2 rounded"
    style="background: var(--surface-2); border: 1px solid var(--border); min-height: 2.5rem"
  ></div>
</div>
<div class="flex gap-2 mt-4 pt-4" style="border-top: 1px solid var(--border)">
  <button class="btn btn-primary" style="width: 100px" onclick="saveMessageEdit()">Save</button>
  <button
    class="btn btn-secondary"
    style="width: 100px"
    type="button"
    onclick="closeModal('modal-edit-message')"
  >
    Cancel
  </button>
</div>
{% endcall %}
