{% from "macros.html" import icon_edit, icon_trash %}
<div
  class="card{% if current_character_id == char.id %} active{% endif %}"
  id="char-card-{{ char.id }}"
  data-char-name="{{ char.name | lower }}"
  data-char-created="{{ char.created_at }}"
>
  <div class="card-view-full h-full flex flex-col" style="display:{{ 'none' if compact_view else 'flex' }};">
    <div
      class="card-image"
      style="aspect-ratio: 1/1; border-radius: 12px 12px 0 0; cursor: pointer"
      role="button"
      tabindex="0"
      onclick="selectCharModal('{{ char.id }}', '{{ char.name }}')"
    >
      {% if char.image_path %}
      <img
        src="/{{ char.image_path }}"
        alt="{{ char.name }} avatar"
        loading="lazy"
        style="border-radius: 12px 12px 0 0"
      />
      {% else %}
      <span class="text-3xl">{{ char.name[:1] }}</span>
      {% endif %}
    </div>
    <div class="card-body" style="padding: 0.75rem">
      <div class="font-bold text-sm truncate mb-1">{{ char.name }}</div>
      <div class="text-xs text-muted truncate mb-2">{{ char.card.get('description','')[:40] or 'No details' }}</div>
      <div class="flex gap-1 mt-auto">
        <button
          class="btn btn-secondary btn-sm flex-1"
          data-char-id="{{ char.id }}"
          data-char-name="{{ char.name }}"
          data-char-desc="{{ char.card.get('description','') }}"
          data-char-image="{{ char.image_path or '' }}"
          data-char-media="{{ char.images | tojson | forceescape }}"
          onclick="event.stopPropagation(); openEditCharacterModal(this);"
          aria-label="Edit character"
        >
          {{ icon_edit() }}
        </button>
        <button
          class="btn btn-danger btn-sm"
          onclick="event.stopPropagation(); promptDeleteChar('{{ char.id }}', '{{ char.name | escape }}')"
          aria-label="Delete character"
        >
          {{ icon_trash() }}
        </button>
      </div>
    </div>
  </div>
  <div class="card-view-compact" style="display:{{ 'block' if compact_view else 'none' }};">
    <div
      class="flex items-center gap-2.5 p-2.5 cursor-pointer"
      role="button"
      tabindex="0"
      onclick="selectCharModal('{{ char.id }}', '{{ char.name }}')"
    >
      <div
        class="w-10 h-10 rounded-full overflow-hidden shrink-0 border border-(--border) flex items-center justify-center"
        style="background: var(--surface-3)"
      >
        {% if char.image_path %}
        <img
          src="/{{ char.image_path }}"
          alt="{{ char.name }} avatar"
          loading="lazy"
          class="w-full h-full object-cover"
        />
        {% else %}
        <span class="text-sm font-bold text-muted">{{ char.name[:1] }}</span>
        {% endif %}
      </div>
      <div class="flex-1 min-w-0">
        <div class="font-bold text-sm truncate">{{ char.name }}</div>
      </div>
      <div class="flex flex-col gap-1 shrink-0" onclick="event.stopPropagation()">
        <button
          class="btn btn-secondary btn-sm"
          style="padding: 0.2rem 0.4rem; min-width: 0"
          data-char-id="{{ char.id }}"
          data-char-name="{{ char.name }}"
          data-char-desc="{{ char.card.get('description','') }}"
          data-char-image="{{ char.image_path or '' }}"
          data-char-media="{{ char.images | tojson | forceescape }}"
          onclick="event.stopPropagation(); openEditCharacterModal(this);"
          aria-label="Edit character"
        >
          {{ icon_edit(size=12) }}
        </button>
        <button
          class="btn btn-danger btn-sm"
          style="padding: 0.2rem 0.4rem; min-width: 0"
          onclick="event.stopPropagation(); promptDeleteChar('{{ char.id }}', '{{ char.name | escape }}')"
          aria-label="Delete character"
        >
          {{ icon_trash(size=12) }}
        </button>
      </div>
    </div>
  </div>
</div>
