{% for p in personas %}
<div class="sidebar-item {% if current_persona_id == p.id %}active{% endif %}"
  hx-patch="/api/chats/{{ chat_id }}"
  hx-vals='{"persona_id": "{{ p.id }}"}'
  hx-trigger="click"
  hx-swap="none"
  onclick="if(window.CURRENT_CHAT_STATE) window.CURRENT_CHAT_STATE.persona_id = '{{ p.id }}'; document.querySelectorAll('#persona-selector .sidebar-item').forEach(el => el.classList.remove('active')); this.classList.add('active');"
>
  <div class="avatar-thumb">
    {% if p.avatar_path %}
      <img src="/{{ p.avatar_path }}" alt="">
    {% else %}
      {{ p.name[:1] }}
    {% endif %}
  </div>
  <div class="truncate text-sm">{{ p.name }}</div>
</div>
{% endfor %}
