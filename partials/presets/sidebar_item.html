{% from "macros.html" import icon_trash %}
<div class="sidebar-item" id="preset-{{ p.id }}" data-name="{{ p.name | escape }}" :class="{'active': activePreset === $el.dataset.presetId}"
  data-preset-id="{{ p.id }}"
  @click="activePreset = $el.dataset.presetId; htmx.ajax('GET', '/partials/preset-editor/' + $el.dataset.presetId, {target:'#preset-editor', swap:'innerHTML'})">
  <div class="text-sm truncate flex-1">{{ p.name }}</div>
  <button class="btn btn-danger btn-sm" style="margin-left:auto;" data-preset-id="{{ p.id }}" onclick="event.stopPropagation(); promptDeletePreset(this)" aria-label="Delete preset">{{ icon_trash() }}</button>
</div>
