<div class="mb-3">
  <form hx-post="/api/characters/import" hx-encoding="multipart/form-data" hx-target="#char-modal-grid" hx-swap="beforeend" style="display:inline;">
    <label class="btn btn-primary btn-sm" style="cursor:pointer">
      Import PNG
      <input type="file" name="file" accept="image/png" class="hidden" onchange="this.closest('form').requestSubmit()">
    </label>
  </form>
</div>
<div class="grid" id="char-modal-grid" style="grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem;">
  {% for char in characters %}
  <div class="card" style="cursor:pointer;" onclick="selectCharModal('{{ char.id }}', '{{ char.name }}')">
    <div class="card-image" style="aspect-ratio: 1/1; border-radius: 10px;">
      {% if char.image_path %}
        <img src="/{{ char.image_path }}" alt="" style="border-radius: 10px;">
      {% else %}
        <span class="text-2xl">{{ char.name[:1] }}</span>
      {% endif %}
    </div>
    <div class="card-body" style="padding: 0.5rem;">
      <div class="font-bold text-sm truncate">{{ char.name }}</div>
    </div>
  </div>
  {% endfor %}
</div>
<script>
function selectCharModal(charId, charName){
  const chatId = document.getElementById('send-btn').dataset.chatId;
  fetch('/api/chats/' + chatId, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({character_id: charId})
  }).then(function(){
    // Refresh chat list for new character
    htmx.ajax('GET', '/partials/chat-list?character_id=' + charId + '&current_chat_id=' + chatId, {target:'#chat-list', swap:'innerHTML'});
    closeModal('modal-characters');
  });
}
</script>
