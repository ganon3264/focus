<div class="mb-5 flex flex-col gap-3">
  <h3 class="sidebar-title mb-1">Tools</h3>
  <div class="flex gap-2 h-10">
    <form hx-post="/api/characters/import" hx-encoding="multipart/form-data" hx-target="#char-modal-grid" hx-swap="beforeend" class="flex-1 h-full">
      <label class="btn btn-secondary btn-sm w-full h-full flex items-center justify-center cursor-pointer m-0">
        Import PNG Card
        <input type="file" name="file" accept="image/png" class="hidden" onchange="this.closest('form').requestSubmit()">
      </label>
    </form>
    <a href="/characters" class="btn btn-secondary btn-sm flex-1 flex items-center justify-center h-full text-decoration-none">Advanced Editor</a>
  </div>
  <h3 class="sidebar-title mb-1 mt-3">New Character</h3>
  <form onsubmit="createCharModal(event)" class="flex gap-2">
    <input type="text" name="name" placeholder="Name" required class="text-sm flex-1" style="background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-md);padding:0.5rem 0.75rem;">
    <button class="btn btn-primary btn-sm">Create Empty</button>
  </form>
</div>

<h3 class="sidebar-title mb-3">Select Character</h3>
<div class="grid" id="char-modal-grid" style="grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem;">
  {% for char in characters %}
  <div class="card" id="char-card-{{ char.id }}" style="position:relative;">
    <div id="char-display-{{ char.id }}" class="h-full flex flex-col">
      <div class="card-image" style="aspect-ratio: 1/1; border-radius: 12px 12px 0 0; cursor:pointer;" onclick="selectCharModal('{{ char.id }}', '{{ char.name }}')">
        {% if char.image_path %}
          <img src="/{{ char.image_path }}" alt="" style="border-radius: 12px 12px 0 0;">
        {% else %}
          <span class="text-3xl">{{ char.name[:1] }}</span>
        {% endif %}
      </div>
      <div class="card-body" style="padding: 0.75rem;">
        <div class="font-bold text-sm truncate mb-1">{{ char.name }}</div>
        <div class="text-xs text-muted truncate mb-2">{{ char.card.get('description','')[:40] or 'No details' }}</div>
        <div class="flex gap-1 mt-auto">
          <button class="btn btn-secondary btn-sm flex-1" 
                  data-char-id="{{ char.id }}" 
                  data-char-name="{{ char.name }}" 
                  data-char-desc="{{ char.card.get('description','') }}" 
                  data-char-image="{{ char.image_path or '' }}"
                  data-char-media="{{ char.images | tojson | forceescape }}"
                  onclick="event.stopPropagation(); openEditCharacterModal(this)">✎</button>
          <button class="btn btn-danger btn-sm" hx-delete="/api/characters/{{ char.id }}" hx-confirm="Delete character?" hx-on::after-request="htmx.ajax('GET','/partials/characters-modal',{target:'#characters-modal-body',swap:'innerHTML'})" onclick="event.stopPropagation()">×</button>
        </div>
      </div>
    </div>
  </div>
  {% endfor %}
</div>

<script>
function selectCharModal(charId, charName){
  if (window.CURRENT_CHAT_STATE) {
    window.CURRENT_CHAT_STATE.character_id = charId;
  }
  // Instead of explicitly creating a new chat, redirect to /chat?character_id=...
  // The backend will either load the most recent chat for this char, or the greeter state with this char pre-selected.
  window.location.href = '/chat?character_id=' + charId;
}
function createCharModal(e){
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target));
  fetch('/api/characters', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  }).then(function(r){
    if(r.ok) htmx.ajax('GET','/partials/characters-modal',{target:'#characters-modal-body',swap:'innerHTML'});
  });
}
</script>
