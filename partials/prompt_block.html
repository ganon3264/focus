<div class="arranger-item" data-block-id="{{ block.id }}">
  <div class="arranger-header">
    <div class="flex items-center gap-2">
      <span class="arranger-type">{{ block.block_type }}</span>
      <span class="arranger-name">{{ block.name }}</span>
    </div>
    <div class="flex gap-1">
      <button class="btn btn-secondary btn-sm" title="Toggle"
        onclick="fetch('/api/presets/{{ preset_id }}/blocks/{{ block.id }}', {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({enabled:{{ 0 if block.enabled else 1 }}})}).then(()=>htmx.ajax('GET','/partials/prompt-arranger/{{ preset_id }}',{target:'#prompt-arranger',swap:'innerHTML'}))"
      >{{ '✓' if block.enabled else '○' }}</button>
      <button class="btn btn-danger btn-sm" title="Delete"
        hx-delete="/api/presets/{{ preset_id }}/blocks/{{ block.id }}"
        hx-target="#prompt-arranger"
        hx-swap="innerHTML"
        hx-confirm="Delete block?"
        hx-on::after-request="htmx.ajax('GET','/partials/prompt-arranger/{{ preset_id }}',{target:'#prompt-arranger',swap:'innerHTML'})"
      >×</button>
    </div>
  </div>
  <div class="flex gap-2 items-start">
    <select class="text-xs" style="background:var(--surface-3);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:0.2rem;"
      onchange="fetch('/api/presets/{{ preset_id }}/blocks/{{ block.id }}', {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({role:this.value})})"
    >
      <option value="system" {% if block.role == 'system' %}selected{% endif %}>system</option>
      <option value="user" {% if block.role == 'user' %}selected{% endif %}>user</option>
      <option value="assistant" {% if block.role == 'assistant' %}selected{% endif %}>assistant</option>
    </select>
    <textarea class="flex-1 text-sm" rows="2" placeholder="Content"
      onchange="fetch('/api/presets/{{ preset_id }}/blocks/{{ block.id }}', {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({content:this.value})})"
    >{{ block.content }}</textarea>
  </div>
</div>
