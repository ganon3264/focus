{% from "macros.html" import icon_expand, icon_close %}
<div id="{{ modal_id }}" class="modal-overlay" role="dialog" aria-modal="true" style="display:none; z-index: 100;" onclick="if(event.target===this)closeModal('{{ modal_id }}')">
  <div class="modal-content" style="max-width: 600px; width: 95vw; display: flex; flex-direction: column;">
    <div class="modal-header" style="margin-bottom: 1rem;">
      <div class="modal-title">Edit {{ entity_name }}</div>
      <button class="btn btn-secondary" aria-label="Close" onclick="closeModal('{{ modal_id }}')">×</button>
    </div>
    <form id="edit-{{ prefix }}-form" class="flex flex-col gap-4 flex-1" onsubmit="{{ submit_fn }}(event)">
      <input type="hidden" name="id" id="edit-{{ prefix }}-id">
      
      <div class="flex gap-4 items-center">
        <label class="cursor-pointer relative rounded-full overflow-hidden" style="width: 64px; height: 64px; background: var(--surface-3); border: 1px solid var(--border); display: grid; place-items: center; flex-shrink: 0;" title="Change Avatar">
          <img id="edit-{{ prefix }}-image-preview" src="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
          <span id="edit-{{ prefix }}-image-placeholder" class="text-2xl font-bold" style="color: var(--text-muted);"></span>
          <div class="absolute inset-0 bg-black/50 opacity-0 hover:opacity-100 transition-opacity flex items-center justify-center text-white text-xs">
            Upload
          </div>
          <input type="file" accept="image/*" class="hidden" onchange="{{ avatar_fn }}(this)">
        </label>

        <div class="form-group mb-0 flex-1">
          <label>Name</label>
          <input type="text" name="name" id="edit-{{ prefix }}-name" required class="form-control w-full">
        </div>
      </div>

      <div class="form-group mb-0 flex-1 flex flex-col h-full">
        <label>Description</label>
        <div class="textarea-wrapper h-full">
          <textarea name="description" id="edit-{{ prefix }}-desc" rows="10" class="form-control w-full h-full" style="resize:none;"></textarea>
           <button type="button" class="expand-btn" aria-label="Expand text area" onclick="openTextExpander(document.getElementById('edit-{{ prefix }}-desc'), 'Edit {{ entity_name }} Description')">{{ icon_expand(18) }}</button>
        </div>
      </div>
      
      <div class="form-group mb-0 mt-2">
        <label class="text-sm font-semibold text-muted block mb-1">Reference Media</label>
        <div class="char-block-media-section" id="edit-{{ prefix }}-media-section" style="display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;">
          <label class="btn btn-secondary btn-sm block-media-btn" style="height: 48px; padding: 0 0.5rem; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 4px; border-style: dashed; flex-shrink: 0; margin: 0;" title="Add Image or Audio">
            <span class="text-muted text-xl">+</span>
            <input type="file" accept="image/*,audio/*" class="hidden block-media-input" onchange="{{ upload_fn }}(this)">
          </label>
          <span class="text-xs text-muted block-media-placeholder">Add reference image or audio</span>
        </div>
      </div>
      
      <div class="flex gap-2 mt-4 justify-end pt-4" style="border-top: 1px solid var(--border);">
        <button class="btn btn-secondary" style="width: 100px;" type="button" onclick="closeModal('{{ modal_id }}')">Cancel</button>
        <button class="btn btn-primary" style="width: 100px;" type="submit">Save</button>
      </div>
    </form>
  </div>
</div>
