<div class="flex gap-3" style="height:60vh;">
  <div style="width:180px;flex-shrink:0;" class="flex flex-col gap-1 overflow-auto">
    {% for p in presets %}
    <div class="sidebar-item" onclick="loadPresetModal('{{ p.id }}')">
      <div class="text-sm truncate flex-1">{{ p.name }}</div>
      <button class="btn btn-danger btn-sm" style="margin-left:auto;" hx-delete="/api/presets/{{ p.id }}" hx-confirm="Delete?" hx-target="closest div" hx-swap="delete">×</button>
    </div>
    {% endfor %}
    <button class="btn btn-secondary btn-sm w-full mt-1" onclick="fetch('/api/presets',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:'New Preset'})}).then(()=>htmx.ajax('GET','/partials/presets-modal',{target:'#presets-modal-body',swap:'innerHTML'}))">+ New</button>
  </div>
  <div class="flex-1 overflow-auto" style="background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:0.75rem;" id="preset-modal-editor">
    <div class="text-muted text-sm">Select a preset to edit.</div>
  </div>
</div>
<script>
function loadPresetModal(pid){
  htmx.ajax('GET', '/partials/prompt-arranger/' + pid, {target:'#preset-modal-editor', swap:'innerHTML'});
}
</script>
