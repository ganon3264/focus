<div class="flex flex-col gap-1">
  <select class="text-sm" style="background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:0.4rem;"
    hx-patch="/api/chats/{{ chat_id }}"
    hx-vals='{"preset_id": this.value}'
    hx-trigger="change"
    hx-swap="none"
    onchange="htmx.ajax('GET', '/partials/prompt-arranger/' + this.value, {target:'#prompt-arranger', swap:'innerHTML'})"
  >
    <option value="">— Select Preset —</option>
    {% for p in presets %}
    <option value="{{ p.id }}" {% if current_preset_id == p.id %}selected{% endif %}>{{ p.name }}</option>
    {% endfor %}
  </select>
  <div class="flex gap-2 mt-1">
    <button class="btn btn-secondary btn-sm flex-1"
      hx-post="/api/presets"
      hx-vals='{"name":"New Preset"}'
      hx-swap="none"
      hx-on::after-request="window.location.reload()"
    >New</button>
    <button class="btn btn-danger btn-sm"
      hx-delete="/api/presets/{{ current_preset_id }}"
      hx-confirm="Delete this preset?"
      hx-swap="none"
      hx-on::after-request="window.location.reload()"
      {% if not current_preset_id %}disabled{% endif %}
    >Del</button>
  </div>
</div>
