<div class="mb-5 flex flex-col gap-3">
  <h3 class="sidebar-title mb-1 mt-3">New Persona</h3>
  <form onsubmit="submitPersonaModal(event)" class="flex gap-2">
    <input type="text" name="name" placeholder="Name" required class="text-sm flex-1" style="background:var(--surface-2);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-md);padding:0.5rem 0.75rem;">
    <button class="btn btn-primary btn-sm">Create Empty</button>
  </form>
</div>

<h3 class="sidebar-title mb-3">Select Persona</h3>
<div class="grid" style="grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem;">
  {% for p in personas %}
  <div class="card" id="persona-card-{{ p.id }}" style="position:relative;">
    <div id="persona-display-{{ p.id }}" class="h-full flex flex-col">
      <div class="card-image" style="aspect-ratio: 1/1; border-radius: 12px 12px 0 0; cursor:pointer;" onclick="selectPersonaModal('{{ p.id }}')">
        {% if p.avatar_path %}
          <img src="/{{ p.avatar_path }}" alt="" style="border-radius: 12px 12px 0 0;">
        {% else %}
          <span class="text-3xl">{{ p.name[:1] }}</span>
        {% endif %}
      </div>
      <div class="card-body" style="padding: 0.75rem;">
        <div class="font-bold text-sm truncate mb-1">{{ p.name }}</div>
        <div class="text-xs text-muted truncate mb-2">{{ p.description or 'No description' }}</div>
        <div class="flex gap-1 mt-auto">
          <button class="btn btn-secondary btn-sm flex-1" 
                  data-persona-id="{{ p.id }}" 
                  data-persona-name="{{ p.name }}" 
                  data-persona-desc="{{ p.description or '' }}" 
                  data-persona-image="{{ p.avatar_path or '' }}"
                  data-persona-media="{{ p.images | tojson | forceescape }}"
                  onclick="event.stopPropagation(); openEditPersonaModal(this)">✎</button>
          {% if p.name != 'User' %}
          <button class="btn btn-danger btn-sm" hx-delete="/api/personas/{{ p.id }}" hx-confirm="Delete persona?" hx-on::after-request="htmx.ajax('GET','/partials/personas-modal',{target:'#personas-modal-body',swap:'innerHTML'})" onclick="event.stopPropagation()">×</button>
          {% endif %}
        </div>
      </div>
    </div>
  </div>
  {% endfor %}
</div>

<script>
function selectPersonaModal(pid){
  if (window.CURRENT_CHAT_STATE) {
    window.CURRENT_CHAT_STATE.persona_id = pid;
  }
  const sendBtn = document.getElementById('send-btn');
  const chatId = sendBtn ? sendBtn.dataset.chatId : null;
  
  if (chatId) {
    // If we are in an active chat, patch it and reload
    fetch('/api/chats/' + chatId, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({persona_id: pid})
    }).then(function(){
      closeModal('modal-personas');
      window.location.reload();
    });
  } else {
    // If we are in the greeter state (no chat), just close the modal.
    // The next chat created will automatically pick up the updated window.CURRENT_CHAT_STATE
    closeModal('modal-personas');
  }
}
function submitPersonaModal(e){
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target));
  fetch('/api/personas', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  }).then(function(r){
    if(r.ok) htmx.ajax('GET','/partials/personas-modal',{target:'#personas-modal-body',swap:'innerHTML'});
  });
}
</script>
