<div class="p-3" id="persona-{{ p.id }}" data-name="{{ p.name | escape }}" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;">
  <div class="flex gap-3 items-center mb-2">
    <div class="avatar-thumb" style="width:48px;height:48px;font-size:1.2rem;">
      {% if p.avatar_path %}
        <img src="/{{ p.avatar_path }}" alt="{{ p.name }} avatar">
      {% else %}
        {{ p.name[:1] }}
      {% endif %}
    </div>
    <div class="flex-1 min-w-0">
      <div class="font-bold">{{ p.name }}</div>
      <div class="text-sm text-muted truncate">{{ p.description[:60] if p.description else '' }}</div>
    </div>
  </div>
  <div class="flex gap-2">
    <label class="btn btn-secondary btn-sm" style="cursor:pointer">
      Avatar
      <input type="file" accept="image/*" class="hidden" onchange="handleAvatarUpload(this, '/api/personas/{{ p.id }}/avatar')">
    </label>
    {% if p.name != 'User' %}
    <button class="btn btn-danger btn-sm" onclick="promptDeletePersona('{{ p.id }}')">Delete</button>
    {% endif %}
  </div>
</div>
