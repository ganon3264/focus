<!-- TEXT EXPANDER MODAL -->
<div id="modal-text-expander" class="modal-overlay" style="display:none; z-index: 999;" onclick="if(event.target===this)closeTextExpander()">
  <div class="modal-content flex flex-col h-[85vh] max-w-4xl" style="padding: 1.25rem;">
    <div class="modal-header shrink-0 mb-4 flex justify-between items-center w-full">
      <div class="modal-title text-xl font-bold" id="text-expander-title">Edit Text</div>
      <button class="btn btn-secondary w-8 h-8 rounded-full p-0 flex items-center justify-center" onclick="closeTextExpander()">{{ icon_close() }}</button>
    </div>
    <textarea id="text-expander-input" class="form-control w-full flex-1 mb-4" style="resize:none; font-family: ui-monospace, monospace; font-size: 0.9rem; line-height: 1.6;"></textarea>
    <div class="flex justify-end gap-3 shrink-0">
      <button class="btn btn-secondary" onclick="closeTextExpander()" style="min-width: 100px;">Cancel</button>
      <button class="btn btn-primary" onclick="saveTextExpander()" style="min-width: 100px;">Save</button>
    </div>
  </div>
</div>

<script>
if (!window.__textExpanderLoaded) {
  window.__textExpanderLoaded = true;
  let _expanderTarget = null;

  window.openTextExpander = function(targetEl, title) {
    _expanderTarget = targetEl;
    document.getElementById('text-expander-title').innerText = title || 'Edit Text';
    document.getElementById('text-expander-input').value = targetEl.value;
    document.getElementById('modal-text-expander').style.display = 'grid';
    document.getElementById('text-expander-input').focus();
  };

  window.closeTextExpander = function() {
    document.getElementById('modal-text-expander').style.display = 'none';
    _expanderTarget = null;
  };

  window.saveTextExpander = function() {
    if (_expanderTarget) {
      _expanderTarget.value = document.getElementById('text-expander-input').value;
      _expanderTarget.dispatchEvent(new Event('change'));
    }
    closeTextExpander();
  };
}
</script>
