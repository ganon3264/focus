<div id="modal-edit-message" class="modal-overlay" role="dialog" aria-modal="true" style="display:none; z-index: 100;" onclick="if(event.target===this)closeModal('modal-edit-message')">
  <div class="modal-content" style="max-width: 800px; width: 95vw; max-height: 85vh; display: flex; flex-direction: column;">
    <div class="modal-header" style="margin-bottom: 1rem;">
      <div class="modal-title">Edit Message</div>
      <button class="btn btn-secondary" aria-label="Close" onclick="closeModal('modal-edit-message')">×</button>
    </div>
    <div style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; padding-right: 0.5rem;">
      <input type="hidden" id="edit-msg-id">
      <input type="hidden" id="edit-msg-chat-id">
      
      <div id="edit-msg-thought-container" style="display:none;">
        <label class="text-sm font-bold text-muted mb-1 block">Thought Process (Reasoning)</label>
        <textarea id="edit-msg-thought" class="w-full p-2" rows="6" style="background:var(--surface-3); border:1px solid var(--border); color:var(--text); border-radius:6px; font-family:inherit; resize:vertical;"></textarea>
      </div>
      
      <div>
        <label class="text-sm font-bold text-muted mb-1 block">Message Content</label>
        <textarea id="edit-msg-content" class="w-full p-2" rows="8" style="background:var(--surface-2); border:1px solid var(--border); color:var(--text); border-radius:6px; font-family:inherit; resize:vertical;"></textarea>
      </div>
      
      <div>
        <div class="flex justify-between items-center mb-1">
            <label class="text-sm font-bold text-muted">Attachments</label>
            <button class="btn btn-secondary btn-sm" onclick="document.getElementById('edit-msg-attach-input').click()">+ Add Media</button>
            <input type="file" id="edit-msg-attach-input" class="hidden" multiple accept="image/*,audio/*" onchange="uploadMessageAttachment(this)">
        </div>
        <div id="edit-msg-attachments" class="flex gap-2 flex-wrap empty:hidden p-2 rounded" style="background: var(--surface-2); border: 1px solid var(--border); min-height: 2.5rem;">
            <!-- Rendered via JS -->
        </div>
      </div>
    </div>
    <div class="flex gap-2 mt-4 pt-4" style="border-top: 1px solid var(--border);">
      <button class="btn btn-primary" style="width: 100px;" onclick="saveMessageEdit()">Save</button>
      <button class="btn btn-secondary" style="width: 100px;" type="button" onclick="closeModal('modal-edit-message')">Cancel</button>
    </div>
  </div>
</div>
