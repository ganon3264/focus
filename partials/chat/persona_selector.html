{% for p in personas %}
<div
  class="sidebar-item {% if current_persona_id == p.id %}active{% endif %}"
  onclick="StateManager.setPersona('{{ p.id }}'); document.querySelectorAll('#persona-selector .sidebar-item').forEach(el => el.classList.remove('active')); this.classList.add('active');"
>
  <div class="avatar-thumb">
    {% if p.avatar_path %}
    <img src="/{{ p.avatar_path }}" alt="{{ p.name }} avatar" />
    {% else %} {{ p.name[:1] }} {% endif %}
  </div>
  <div class="truncate text-sm">{{ p.name }}</div>
</div>
{% endfor %}
