{% for char in characters %}
<div
  class="sidebar-item char-selector-item {% if current_character_id == char.id %}active{% endif %}"
  data-char-id="{{ char.id }}"
  data-char-id="{{ char.id }}"
  data-current-chat-id="{{ chat_id }}"
  onclick="loadChatList(this.dataset.charId, this.dataset.currentChatId)"
>
  <div class="avatar-thumb">
    {% if char.image_path %}
    <img src="/{{ char.image_path }}" alt="{{ char.name }} avatar" />
    {% else %} {{ char.name[:1] }} {% endif %}
  </div>
  <div class="truncate text-sm">{{ char.name }}</div>
</div>
{% endfor %}
