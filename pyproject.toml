[project]
name = "pyvern"
version = "0.1.0"
description = "A lean SillyTavern alternative"
requires-python = ">=3.11"
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "aiosqlite",
    "httpx",
    "openai",
    "python-multipart",
    "Pillow",
    "jinja2",
    "google-auth",
    "requests",
    "google-genai",
    "tiktoken>=0.13.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pyvern"]
