[project]
name = "pyvern"
version = "0.1.0"
description = "A lean SillyTavern alternative"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "aiosqlite>=0.20.0",
    "httpx>=0.28.0",
    "openai>=1.75.0",
    "python-multipart>=0.0.12",
    "Pillow>=11.0.0",
    "jinja2>=3.1.6",
    "google-auth>=2.20.0",
    "requests>=2.31.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pyvern"]
