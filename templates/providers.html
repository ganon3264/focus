{% from "macros.html" import icon_close %}
{% extends "base.html" %}
{% block title %}Providers - Focus{% endblock %}
{% block content %}
<div class="p-3">
  <h1 class="text-xl font-bold mb-3">Providers</h1>
  <div class="grid gap-2 mb-4" id="provider-grid" style="grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));">
    {% for prov in providers %}
    <div class="p-3" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;">
      <div class="flex justify-between items-center mb-1">
        <strong>{{ prov.name }}</strong>
        <button class="btn btn-danger btn-sm" hx-delete="/api/providers/{{ prov.id }}" hx-confirm="Delete?" hx-target="closest div" hx-swap="delete" aria-label="Delete provider">{{ icon_close(16) }}</button>
      </div>
      <div class="text-sm text-muted">{{ prov.type }} • {{ prov.model }}</div>
      <div class="text-sm text-muted truncate">{{ prov.base_url or '' }}</div>
    </div>
    {% endfor %}
  </div>

  <h2 class="text-lg font-bold mb-2">Add Provider</h2>
  <form onsubmit="submitProvider(event)" class="grid gap-2" style="grid-template-columns: 1fr 1fr;max-width:600px;">
    <div class="form-group">
      <label>Name</label>
      <input type="text" name="name" required>
    </div>
    <div class="form-group">
      <label>Type</label>
      <select name="type">
        <option value="openai_compat">OpenAI Compatible</option>
        <option value="openrouter">OpenRouter</option>
      </select>
    </div>
    <div class="form-group">
      <label>Base URL</label>
      <input type="text" name="base_url" placeholder="https://api.example.com/v1">
    </div>
    <div class="form-group">
      <label>API Key</label>
      <input type="password" name="api_key">
    </div>
    <div class="form-group">
      <label>Model</label>
      <input type="text" name="model" required placeholder="gpt-4">
    </div>
    <div class="form-group">
      <label>Params JSON</label>
      <input type="text" name="params" value="{}" placeholder='{"key":"val"}'>
    </div>
    <div class="col-span-full">
      <button class="btn btn-primary">Add Provider</button>
    </div>
  </form>
</div>
<script>
function submitProvider(e){
  e.preventDefault();
  var form = e.target;
  var data = Object.fromEntries(new FormData(form));
  try { data.params = JSON.parse(data.params || '{}'); } catch(err){ data.params = {}; }
  fetch('/api/providers', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(data)
  }).then(function(r){
    if(!r.ok) { r.text().then(function(t){ alert('Failed to create provider: ' + t); }); return; }
    return r.json();
  }).then(function(result){
    if (!result) return;
    var grid = document.getElementById('provider-grid');
    if (!grid) return;
    var div = document.createElement('div');
    div.className = 'p-3';
    div.style.cssText = 'background:var(--surface);border:1px solid var(--border);border-radius:10px;';
    var hdr = document.createElement('div');
    hdr.className = 'flex justify-between items-center mb-1';
    var strong = document.createElement('strong');
    strong.textContent = data.name;
    var btn = document.createElement('button');
    btn.className = 'btn btn-danger btn-sm';
    btn.setAttribute('hx-delete', '/api/providers/' + result.id);
    btn.setAttribute('hx-confirm', 'Delete?');
    btn.setAttribute('hx-target', 'closest div');
    btn.setAttribute('hx-swap', 'delete');
    btn.setAttribute('aria-label', 'Delete provider');
    btn.innerHTML = window.getSvgSprite('close', 16);
    hdr.appendChild(strong);
    hdr.appendChild(btn);
    var meta = document.createElement('div');
    meta.className = 'text-sm text-muted';
    meta.textContent = data.type + ' \u2022 ' + data.model;
    var url = document.createElement('div');
    url.className = 'text-sm text-muted truncate';
    url.textContent = data.base_url || '';
    div.appendChild(hdr);
    div.appendChild(meta);
    div.appendChild(url);
    grid.insertBefore(div, grid.firstChild);
    htmx.process(div);
    form.reset();
  });
}
</script>
{% endblock %}
