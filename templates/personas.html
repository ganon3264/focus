{% extends "base.html" %}
{% block title %}Personas - Focus{% endblock %}
{% block content %}
<div class="p-3">
  <h1 class="text-xl font-bold mb-3">Personas</h1>
  <div class="grid gap-2 mb-4" id="persona-grid" style="grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));">
    {% for p in personas %}
    {% include "personas/persona-card.html" %}
    {% endfor %}
  </div>

  <h2 class="text-lg font-bold mb-2">Add Persona</h2>
  <form onsubmit="submitPersona(event)" class="grid gap-2" style="grid-template-columns: 1fr 1fr;max-width:500px;">
    <div class="form-group">
      <label>Name</label>
      <input type="text" name="name" class="form-control" required>
    </div>
    <div class="form-group">
      <label>Description</label>
      <input type="text" name="description" class="form-control">
    </div>
    <button class="btn btn-primary" style="grid-column: span 2;">Create Persona</button>
  </form>
</div>
<script>
function promptDeletePersona(btn) {
  var pid = btn.dataset.personaId || '';
  var card = document.getElementById('persona-' + pid);
  var pName = card ? card.getAttribute('data-name') || 'this persona' : 'this persona';
  window.customConfirm('Delete persona <strong>' + window.escapeHtml(pName) + '</strong>?', function() {
    fetch('/api/personas/' + pid, {
      method: 'DELETE'
    }).then(function(r) {
      if(!r.ok) return;
      var c = document.getElementById('persona-' + pid);
      if (c) c.remove();
      var grid = document.getElementById('persona-grid');
      if (grid && grid.children.length === 0) {
        grid.innerHTML = '<div class="text-muted text-center text-sm py-6 border border-dashed border-(--border) rounded-lg">No personas found. Create one to get started!</div>';
      }
    });
  });
}

function submitPersona(e){
  e.preventDefault();
  var form = e.target;
  fetch('/api/personas', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(Object.fromEntries(new FormData(form)))
  }).then(function(r){
    if(!r.ok) { r.text().then(function(t){ alert('Failed to create persona: ' + t); }); return; }
    return r.json();
  }).then(function(result){
    if (!result) return;
    var grid = document.getElementById('persona-grid');
    if (!grid) return;
    var emptyMsg = grid.querySelector('.border-dashed');
    if (emptyMsg) emptyMsg.remove();
    fetch('/partials/persona-card/' + result.id)
      .then(function(r) { return r.text(); })
      .then(function(html) {
        var temp = document.createElement('div');
        temp.innerHTML = html;
        grid.insertBefore(temp.firstElementChild, grid.firstChild);
        htmx.process(grid.firstElementChild);
        form.reset();
      });
  });
}
</script>
{% endblock %}
