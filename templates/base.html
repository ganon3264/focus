<!DOCTYPE html>
{% from "macros.html" import icon_close, icon_expand %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pyvern{% endblock %}</title>

    <script>
      window.SVG_MUSIC = '<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>';
      (function() {
        try {
          const stored = localStorage.getItem('pyvern-custom-theme');
          if (stored) {
            const theme = JSON.parse(stored);
            for (const key in theme) {
              document.documentElement.style.setProperty(key, theme[key]);
            }
          }
        } catch (e) { console.error('Error loading theme:', e); }
      })();
    </script>

    <link rel="stylesheet" href="/static/vendor/inter.css">
    <link rel="stylesheet" href="/static/vendor/cropper.min.css">
    <script src="/static/vendor/tailwindcss.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              surface: {
                50: '#f8fafc',
                100: '#f1f5f9',
                200: '#e2e8f0',
                300: '#cbd5e1',
                400: '#94a3b8',
                500: '#64748b',
                600: '#475569',
                700: '#334155',
                800: '#1e293b',
                900: '#0f172a',
                950: '#020617',
              },
              indigo: {
                50: '#eef2ff',
                100: '#e0e7ff',
                200: '#c7d2fe',
                300: '#a5b4fc',
                400: '#818cf8',
                500: '#6366f1',
                600: '#4f46e5',
                700: '#4338ca',
                800: '#3730a3',
                900: '#312e81',
                950: '#1e1b4b',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/vendor/htmx2.min.js"></script>
    <script src="/static/vendor/json-enc.js"></script>
    <script defer src="/static/vendor/alpine-collapse.min.js"></script>
    <script defer src="/static/vendor/alpine.min.js"></script>
    <script src="/static/vendor/sortable.min.js"></script>
    <script src="/static/vendor/marked.umd.js"></script>
    <script src="/static/vendor/purify.min.js"></script>
    <script src="/static/vendor/cropper.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-dark text-light" hx-ext="json-enc">
    {% block content %}{% endblock %}
    {% include "confirm_modal.html" %}
    
    <!-- Global Lightbox for Images -->
    <div id="lightbox" class="fixed inset-0 z-[9999] bg-black/90 hidden flex-col items-center justify-center backdrop-blur-sm" onclick="closeLightbox(event)">
      <button id="lightbox-close" class="absolute top-4 right-4 text-white/50 hover:text-white bg-black/50 hover:bg-black/75 rounded-full w-10 h-10 flex items-center justify-center transition-colors text-xl font-bold cursor-pointer focus:outline-none z-50" onclick="closeLightbox(event)" title="Close">×</button>
      <img id="lightbox-img" src="" class="max-w-[95vw] max-h-[95vh] object-contain rounded shadow-2xl" onclick="event.stopPropagation()">
    </div>

    <!-- Global Crop Modal -->
    <div id="crop-modal" class="fixed inset-0 z-[9999] bg-black/80 hidden flex-col items-center justify-center backdrop-blur-sm">
      <div class="bg-[var(--surface)] border border-[var(--border)] rounded-xl w-full max-w-2xl flex flex-col overflow-hidden">
        <div class="flex justify-between items-center p-4 border-b border-[var(--border)]">
          <h3 class="text-lg font-bold">Crop Image</h3>
          <button class="btn btn-secondary w-8 h-8 rounded-full p-0 flex items-center justify-center" onclick="closeCropModal()">{{ icon_close() }}</button>
        </div>
        <div class="p-4 bg-[var(--surface-2)]" style="height: 60vh;">
          <img id="crop-image" src="" class="max-w-full max-h-full block">
        </div>
        <div class="flex justify-end gap-3 p-4 border-t border-[var(--border)] bg-[var(--surface)]">
          <button class="btn btn-secondary" onclick="closeCropModal()">Cancel</button>
          <button class="btn btn-primary" id="crop-save-btn">Save Crop</button>
        </div>
      </div>
    </div>

    <script>
      function openLightbox(src) {
        const lb = document.getElementById('lightbox');
        const img = document.getElementById('lightbox-img');
        img.src = src;
        lb.classList.remove('hidden');
        lb.classList.add('flex');
      }
      function closeLightbox(e) {
        const lb = document.getElementById('lightbox');
        lb.classList.remove('flex');
        lb.classList.add('hidden');
        document.getElementById('lightbox-img').src = '';
      }

      // Crop functionality
      let cropper = null;
      let currentCropCallback = null;
      let currentCropOptions = null;

      function openCropModal(file, callback, options = {}) {
        const modal = document.getElementById('crop-modal');
        const img = document.getElementById('crop-image');
        
        currentCropCallback = callback;
        currentCropOptions = options;
        
        const url = URL.createObjectURL(file);
        img.src = url;
        
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        
        if (cropper) {
          cropper.destroy();
        }
        
        // Initialize cropper after a short delay to ensure modal is visible
        setTimeout(() => {
          cropper = new Cropper(img, {
            aspectRatio: options.aspectRatio !== undefined ? options.aspectRatio : 1,
            viewMode: 1,
            dragMode: 'move',
            background: false,
            autoCropArea: 0.8,
            guides: true,
            center: true,
            highlight: false,
            cropBoxMovable: true,
            cropBoxResizable: true,
            toggleDragModeOnDblclick: false,
          });
        }, 50);
      }

      function closeCropModal() {
        const modal = document.getElementById('crop-modal');
        modal.classList.remove('flex');
        modal.classList.add('hidden');
        if (cropper) {
          cropper.destroy();
          cropper = null;
        }
        document.getElementById('crop-image').src = '';
        currentCropCallback = null;
        currentCropOptions = null;
      }

      document.getElementById('crop-save-btn').addEventListener('click', () => {
        if (!cropper || !currentCropCallback) return;
        
        let getOpts = {
          imageSmoothingEnabled: true,
          imageSmoothingQuality: 'high',
        };
        
        // If we forced an aspect ratio, we can force output dimensions, else just export natural cropped dimensions
        if (currentCropOptions && currentCropOptions.aspectRatio === 1) {
          getOpts.width = 512;
          getOpts.height = 512;
        }

        const cb = currentCropCallback;
        cropper.getCroppedCanvas(getOpts).toBlob((blob) => {
          cb(blob);
          closeCropModal();
        }, 'image/png');
      });

      function handleAvatarUpload(fileInput, endpoint, successCallback) {
        if (!fileInput.files || !fileInput.files[0]) return;
        
        const file = fileInput.files[0];
        
        openCropModal(file, (croppedBlob) => {
          const formData = new FormData();
          formData.append('file', croppedBlob, 'avatar.png');
          
          fetch(endpoint, {
            method: 'POST',
            body: formData
          }).then(r => r.json()).then(data => {
            if (successCallback) {
              successCallback(data);
            } else {
              window.location.reload();
            }
          });
        });
        
        // Reset file input so the same file can be selected again if needed
        fileInput.value = '';
      }
    </script>
    
    <script src="/static/chat_stream.js"></script>
</body>
</html>
