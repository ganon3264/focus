<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pyvern{% endblock %}</title>

    <link rel="stylesheet" href="/static/vendor/inter.css">
    <script src="/static/vendor/tailwindcss.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              surface: {
                50: '#f8fafc',
                100: '#f1f5f9',
                200: '#e2e8f0',
                300: '#cbd5e1',
                400: '#94a3b8',
                500: '#64748b',
                600: '#475569',
                700: '#334155',
                800: '#1e293b',
                900: '#0f172a',
                950: '#020617',
              },
              indigo: {
                50: '#eef2ff',
                100: '#e0e7ff',
                200: '#c7d2fe',
                300: '#a5b4fc',
                400: '#818cf8',
                500: '#6366f1',
                600: '#4f46e5',
                700: '#4338ca',
                800: '#3730a3',
                900: '#312e81',
                950: '#1e1b4b',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/vendor/htmx.min.js"></script>
    <script src="/static/vendor/json-enc.js"></script>
    <script defer src="/static/vendor/alpine.min.js"></script>
    <script src="/static/vendor/sortable.min.js"></script>
    <script src="/static/vendor/marked.umd.js"></script>
    <script src="/static/vendor/purify.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-dark text-light" hx-ext="json-enc">
    {% block content %}{% endblock %}
    {% include "confirm_modal.html" %}
    
    <!-- Global Lightbox for Images -->
    <div id="lightbox" class="fixed inset-0 z-[9999] bg-black/90 hidden flex-col items-center justify-center backdrop-blur-sm" onclick="closeLightbox(event)">
      <button id="lightbox-close" class="absolute top-4 right-4 text-white/50 hover:text-white bg-black/50 hover:bg-black/75 rounded-full w-10 h-10 flex items-center justify-center transition-colors text-xl font-bold cursor-pointer focus:outline-none z-50" onclick="closeLightbox(event)" title="Close">×</button>
      <img id="lightbox-img" src="" class="max-w-[95vw] max-h-[95vh] object-contain rounded shadow-2xl" onclick="event.stopPropagation()">
    </div>

    <script>
      function openLightbox(src) {
        const lb = document.getElementById('lightbox');
        const img = document.getElementById('lightbox-img');
        img.src = src;
        lb.classList.remove('hidden');
        lb.classList.add('flex');
      }
      function closeLightbox(e) {
        const lb = document.getElementById('lightbox');
        lb.classList.remove('flex');
        lb.classList.add('hidden');
        document.getElementById('lightbox-img').src = '';
      }
    </script>
    
    <script src="/static/chat_stream.js"></script>
</body>
</html>
