<!DOCTYPE html>
{% from "macros.html" import icon_close, icon_expand %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Pyvern{% endblock %}</title>

    <script>
      (function() {
        try {
          const stored = localStorage.getItem('pyvern-custom-theme');
          if (stored) {
            const theme = JSON.parse(stored);
            if (theme['--accent'] && !theme['--accent-hover']) {
              var m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(theme['--accent']);
              if (m) {
                var r = parseInt(m[1],16), g = parseInt(m[2],16), b = parseInt(m[3],16);
                var f = 0.15, l = function(c) { return Math.round(c + (255 - c) * f); };
                var r2 = l(r), g2 = l(g), b2 = l(b);
                theme['--accent-hover'] = '#' + [r2,g2,b2].map(function(c) { return c.toString(16).padStart(2,'0'); }).join('');
                theme['--accent-dim'] = 'rgba(' + r + ',' + g + ',' + b + ',0.15)';
                theme['--accent-faint'] = 'rgba(' + r + ',' + g + ',' + b + ',0.05)';
              }
            }
            for (const key in theme) {
              document.documentElement.style.setProperty(key, theme[key]);
            }
          }
        } catch (e) { console.error('Error loading theme:', e); }
      })();
    </script>

    <link rel="stylesheet" href="/static/vendor/inter.css">
    <link rel="stylesheet" href="/static/vendor/cropper.min.css">
    <script src="/static/vendor/tailwindcss.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              surface: {
                50: '#f8fafc',
                100: '#f1f5f9',
                200: '#e2e8f0',
                300: '#cbd5e1',
                400: '#94a3b8',
                500: '#64748b',
                600: '#475569',
                700: '#334155',
                800: '#1e293b',
                900: '#0f172a',
                950: '#020617',
              },
              indigo: {
                50: '#eef2ff',
                100: '#e0e7ff',
                200: '#c7d2fe',
                300: '#a5b4fc',
                400: '#818cf8',
                500: '#6366f1',
                600: '#4f46e5',
                700: '#4338ca',
                800: '#3730a3',
                900: '#312e81',
                950: '#1e1b4b',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/vendor/htmx2.min.js"></script>
    <script src="/static/vendor/json-enc.js"></script>
    <script defer src="/static/vendor/alpine-collapse.min.js"></script>
    <script defer src="/static/vendor/alpine.min.js"></script>
    <script src="/static/vendor/sortable.min.js"></script>
    <script src="/static/vendor/marked.umd.js"></script>
    <script src="/static/vendor/purify.min.js"></script>
    <script src="/static/vendor/cropper.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-dark text-light" hx-ext="json-enc">
    {% from "macros.html" import icon_close, icon_music, icon_send, icon_regen, icon_crop %}
    <div style="display:none" aria-hidden="true" id="svg-sprite">
      <svg data-svg-icon="close" data-svg-size="16">{{ icon_close(16) }}</svg>
      <svg data-svg-icon="music" data-svg-size="24">{{ icon_music(24) }}</svg>
      <svg data-svg-icon="send" data-svg-size="18">{{ icon_send() }}</svg>
      <svg data-svg-icon="regen" data-svg-size="18">{{ icon_regen() }}</svg>
      <svg data-svg-icon="crop" data-svg-size="12">{{ icon_crop(12) }}</svg>
    </div>
    <!-- ── inline scripts ──────────────────────────────────────────────── -->
    <script>
    window.getSvgSprite = function(name, size) {
      var el = document.querySelector('#svg-sprite svg[data-svg-icon="' + name + '"]');
      if (!el) return '';
      var clone = el.cloneNode(true);
      if (size) { clone.setAttribute('width', size); clone.setAttribute('height', size); }
      return clone.outerHTML;
    };

    window.buildMediaThumbnail = function(img, onDelete, idPrefix) {
      var div = document.createElement('div');
      div.className = 'relative group';
      Object.assign(div.style, {
        width: '48px', height: '48px', borderRadius: '4px', overflow: 'hidden',
        border: '1px solid var(--border)', flexShrink: '0'
      });
      if (idPrefix) div.id = idPrefix + '-' + img.id;

      if (img.mime_type && img.mime_type.startsWith('audio/')) {
        div.innerHTML = '<div style="width:100%;height:100%;background:var(--surface-3);display:grid;place-items:center;" title="Audio Attachment">' + getSvgSprite('music', 24) + '</div>';
      } else {
        div.innerHTML = '<img src="/' + (img.image_path || '') + '" style="width:100%;height:100%;object-fit:cover;">';
      }

      if (onDelete) {
        var btn = document.createElement('button');
        btn.className = 'absolute top-0 right-0 w-4 h-4 bg-red-500 text-white text-xs flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity';
        btn.type = 'button';
        btn.innerHTML = '×';
        btn.onclick = function(e) { e.preventDefault(); e.stopPropagation(); onDelete(e); };
        div.appendChild(btn);
      }

      return div;
    };

    window.setupDropZone = function(el, onDrop) {
      var container = typeof el === 'string' ? document.querySelector(el) : el;
      if (!container || container.dataset.dropReady) return;
      container.dataset.dropReady = 'true';
      container.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); container.classList.add('drag-over'); });
      container.addEventListener('dragleave', function(e) { e.preventDefault(); e.stopPropagation(); container.classList.remove('drag-over'); });
      container.addEventListener('drop', function(e) {
        e.preventDefault(); e.stopPropagation();
        container.classList.remove('drag-over');
        if (e.dataTransfer.files && e.dataTransfer.files.length) onDrop(Array.from(e.dataTransfer.files));
      });
    };

    window.createEditModalHandlers = function(cfg) {
      var P = cfg.dataPrefix;
      var secId = cfg.mediaSectionId;
      var sec = function() { return document.getElementById(secId); };
      var eid = function(suf) { return document.getElementById(cfg.idPrefix + suf); };
      var mid = cfg.modalId;

      window[cfg.uploadFileFn] = function(file) {
        var id = eid('-id').value;
        if (!id) return;
        var fd = new FormData();
        fd.append('file', file);
        fetch(cfg.apiImages(id), { method: 'POST', body: fd }).then(function(r) { return r.json(); }).then(function(data) {
          var s = sec();
          if (!s) return;
          var div = buildMediaThumbnail(data, function(e) { window[cfg.deleteFn](data.id); }, cfg.mediaIdPrefix);
          s.insertBefore(div, s.lastElementChild.previousElementSibling);
          var ph = s.querySelector('.block-media-placeholder');
          if (ph) ph.style.display = 'none';
          if (window.CURRENT_CHAT_STATE && window.CURRENT_CHAT_STATE[cfg.stateKey] === id && window.reloadPromptArranger) {
            var pid = window.CURRENT_CHAT_STATE.preset_id || (document.getElementById('prompt-arranger') && document.querySelector('#prompt-arranger .arranger-list') ? document.querySelector('#prompt-arranger .arranger-list').id.replace('arranger-list-', '') : null);
            if (pid) reloadPromptArranger(pid, 'prompt-arranger');
          }
        });
      };

      window[cfg.openFn] = function(btn) {
        eid('-id').value = btn.dataset[P + 'Id'] || '';
        var name = btn.dataset[P + 'Name'] || '';
        eid('-name').value = name;
        eid('-desc').value = btn.dataset[P + 'Desc'] || '';
        var imgPath = btn.dataset[P + 'Image'];
        var prev = eid('-image-preview');
        var ph = eid('-image-placeholder');
        if (imgPath) {
          prev.src = '/' + imgPath + '?t=' + new Date().getTime();
          prev.style.display = 'block';
          ph.style.display = 'none';
        } else {
          prev.style.display = 'none';
          ph.innerText = name ? name.charAt(0).toUpperCase() : '?';
          ph.style.display = 'block';
        }
        var s = sec();
        Array.from(s.children).forEach(function(el) {
          if (!el.classList.contains('block-media-btn') && !el.classList.contains('block-media-placeholder')) el.remove();
        });
        var phText = s.querySelector('.block-media-placeholder');
        var list = [];
        try { list = JSON.parse(btn.dataset[P + 'Media'] || '[]'); } catch (e) { console.error(e); }
        if (list.length > 0 && phText) { phText.style.display = 'none'; }
        else if (list.length === 0 && phText) { phText.style.display = 'block'; }
        list.forEach(function(img) {
          s.insertBefore(buildMediaThumbnail(img, function(e) { window[cfg.deleteFn](img.id); }, cfg.mediaIdPrefix), s.lastElementChild.previousElementSibling);
        });
        document.getElementById(mid).style.display = 'grid';
      };

      window[cfg.uploadFn] = function(input) {
        if (!input.files || !input.files[0]) return;
        window[cfg.uploadFileFn](input.files[0]);
        input.value = '';
      };

      window[cfg.deleteFn] = function(imageId) {
        var id = eid('-id').value;
        if (!id) return;
        fetch(cfg.apiImage(id, imageId), { method: 'DELETE' }).then(function(r) {
          if (!r.ok) return;
          var el = document.getElementById(cfg.mediaIdPrefix + '-' + imageId);
          if (el) el.remove();
          if (window.CURRENT_CHAT_STATE && window.CURRENT_CHAT_STATE[cfg.stateKey] === id && window.reloadPromptArranger) {
            var pid = window.CURRENT_CHAT_STATE.preset_id || (document.getElementById('prompt-arranger') && document.querySelector('#prompt-arranger .arranger-list') ? document.querySelector('#prompt-arranger .arranger-list').id.replace('arranger-list-', '') : null);
            if (pid) reloadPromptArranger(pid, 'prompt-arranger');
          }
        });
      };

      window[cfg.avatarFn] = function(input) {
        if (!input.files || !input.files[0]) return;
        var id = eid('-id').value;
        if (!id) return;
        openCropModal(input.files[0], function(blob) {
          var fd = new FormData();
          fd.append('file', blob, 'avatar.png');
          fetch(cfg.apiAvatar(id), { method: 'POST', body: fd }).then(function(r) { return r.json(); }).then(function(data) {
            var prev = eid('-image-preview');
            var ph = eid('-image-placeholder');
            prev.src = '/' + data.avatar_path + '?t=' + new Date().getTime();
            prev.style.display = 'block';
            ph.style.display = 'none';
          });
        });
        input.value = '';
      };

      window[cfg.submitFn] = function(e) {
        e.preventDefault();
        var id = eid('-id').value;
        if (!id) return;
        var data = Object.fromEntries(new FormData(e.target));
        fetch(cfg.apiGet(id), {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(data)
        }).then(async function(r) {
          if (!r.ok) return;
          closeModal(mid);
          htmx.ajax('GET', cfg.modalBodyUrl, {target: cfg.modalBodySelector, swap: 'innerHTML'});
        });
      };

      setupDropZone(cfg.dropZoneSelector, function(files) { files.forEach(window[cfg.uploadFileFn]); });
    };
    </script>
    <!-- / inline scripts ───────────────────────────────────────────────── -->
    {% block content %}{% endblock %}
    {% include "confirm_modal.html" %}
    
    <!-- Global Lightbox for Images -->
     <div id="lightbox" class="fixed inset-0 z-[9999] bg-black/90 hidden flex-col items-center justify-center backdrop-blur-sm" role="dialog" aria-modal="true" aria-label="Image lightbox" onclick="closeLightbox(event)">
       <button id="lightbox-close" class="absolute top-4 right-4 text-white/50 hover:text-white bg-black/50 hover:bg-black/75 rounded-full w-10 h-10 flex items-center justify-center transition-colors text-xl font-bold cursor-pointer focus:outline-none z-50" onclick="closeLightbox(event)" title="Close" aria-label="Close lightbox">×</button>
       <img id="lightbox-img" src="" alt="Enlarged image" class="max-w-[95vw] max-h-[95vh] object-contain rounded shadow-2xl" onclick="event.stopPropagation()">
    </div>

    <!-- Global Crop Modal -->
     <div id="crop-modal" class="fixed inset-0 z-[9999] bg-black/80 hidden flex-col items-center justify-center backdrop-blur-sm" role="dialog" aria-modal="true" aria-label="Image crop tool">
      <div class="bg-[var(--surface)] border border-[var(--border)] rounded-xl w-full max-w-2xl flex flex-col overflow-hidden">
        <div class="flex justify-between items-center p-4 border-b border-[var(--border)]">
          <h3 class="text-lg font-bold">Crop Image</h3>
          <button class="btn btn-secondary w-8 h-8 rounded-full p-0 flex items-center justify-center" onclick="closeCropModal()" aria-label="Close crop tool">{{ icon_close() }}</button>
        </div>
        <div class="p-4 bg-[var(--surface-2)]" style="height: 60vh;">
          <img id="crop-image" src="" alt="Image to crop" class="max-w-full max-h-full block">
        </div>
        <div class="flex justify-end gap-3 p-4 border-t border-[var(--border)] bg-[var(--surface)]">
          <button class="btn btn-secondary" onclick="closeCropModal()">Cancel</button>
          <button class="btn btn-primary" id="crop-save-btn">Save Crop</button>
        </div>
      </div>
    </div>

    <script src="/static/js/api_paths.js"></script>
    <script src="/static/js/lightbox.js"></script>

    <script src="/static/js/list_manager.js"></script>
    <script src="/static/chat_stream.js"></script>
</body>
</html>
